services:
  - type: web
    name: gs-account-manager
    runtime: node
    repo: https://github.com/OnlyGrimm-hud/GSAccountManager
    branch: main
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: AUTO_MIGRATE
        value: "true"
      - key: APP_NAME
        value: GS Account Manager
      - key: DATABASE_URL
        fromDatabase:
          name: gs-account-manager-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false

databases:
  - name: gs-account-manager-db
    plan: free
    databaseName: gs_account_manager
    user: gs_account_manager
